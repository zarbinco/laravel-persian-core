name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        dependencies: ['highest', 'lowest']

    name: PHP ${{ matrix.php }} / ${{ matrix.dependencies }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-php-${{ matrix.php }}-${{ matrix.dependencies }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-${{ runner.os }}-php-${{ matrix.php }}-${{ matrix.dependencies }}-
            composer-${{ runner.os }}-php-${{ matrix.php }}-
            composer-${{ runner.os }}-

      - name: Install highest dependencies
        if: matrix.dependencies == 'highest'
        run: composer update --prefer-stable --no-interaction --no-progress

      - name: Install lowest dependencies
        if: matrix.dependencies == 'lowest'
        run: composer update --prefer-lowest --prefer-stable --no-interaction --no-progress

      - name: Validate composer
        run: composer validate --strict

      - name: Run tests
        run: composer test

      - name: Run PHPStan
        run: composer analyse

      - name: Run Pint
        if: matrix.php == '8.3' && matrix.dependencies == 'highest'
        run: composer format -- --test
